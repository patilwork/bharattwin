version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bharattwin_db
    environment:
      POSTGRES_DB: bharattwin
      POSTGRES_USER: bharattwin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bharattwin -d bharattwin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
